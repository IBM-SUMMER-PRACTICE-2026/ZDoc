name: build & release

# On every push to main: a fast Linux x64 build + test (catches breakage).
# Only when the in-source version (ZD_VERSION) is bumped to a new value do the
# remaining native platforms build + test and everything gets published to a
# separate GitOps repo. So normal merges cost ~1-2 min; the full multi-arch
# matrix runs only for an actual release.
on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to push the version tag back to this repo

concurrency:
  group: release
  cancel-in-progress: false

env:
  RELEASE_REPO: ${{ vars.RELEASE_REPO }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH || 'release' }}

jobs:
  # ---------------------------------------------------------------------------
  # Always: quick Linux x64 build + test, and decide whether this is a release.
  # The linux-x64 artifact is reused by the release, so it is never built twice.
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build + test (linux-x64)
        run: |
          make all
          make test
          PLATFORM=linux-x64 sh scripts/collect-artifacts.sh

      - name: Is this a new version?
        id: check
        env:
          CHECK_ONLY: '1'
        run: sh scripts/tag-version.sh

      - name: Upload linux-x64 artifact
        if: steps.check.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/linux-x64
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release-only: the remaining native platforms, each built + tested on its own
  # hardware. Skipped entirely unless ci flagged a new version.
  # ---------------------------------------------------------------------------
  build:
    needs: ci
    if: needs.ci.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-13            # Intel
            platform: macos-x64
          - os: macos-14            # Apple Silicon
            platform: macos-arm64
          - os: windows-latest      # x64
            platform: windows-x64
            msystem: UCRT64
            install: make gcc
            cc: gcc
          - os: windows-11-arm      # ARM64
            platform: windows-arm64
            msystem: CLANGARM64
            install: make clang
            cc: clang
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ contains(matrix.os, 'windows') && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSYS2 (Windows)
        if: ${{ contains(matrix.os, 'windows') }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.install }}

      - name: Build
        run: make all ${{ matrix.cc && format('CC={0}', matrix.cc) || '' }}

      - name: Test
        run: make test ${{ matrix.cc && format('CC={0}', matrix.cc) || '' }}

      - name: Collect artifacts
        env:
          PLATFORM: ${{ matrix.platform }}
        run: sh scripts/collect-artifacts.sh

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release-only: tag the version and publish every platform's binaries. Runs
  # only after ci + all build legs succeed (so it is skipped on normal pushes).
  # ---------------------------------------------------------------------------
  publish:
    needs: [ci, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist   # each artifact -> dist/<platform>/

      - name: Tag version
        id: tag
        run: sh scripts/tag-version.sh

      - name: Push tag
        run: git push origin "${{ steps.tag.outputs.tag }}"

      - name: Publish to GitOps repo
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: sh scripts/publish.sh
