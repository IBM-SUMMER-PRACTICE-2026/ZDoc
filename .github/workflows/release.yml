name: release

# GitOps release pipeline with native build + test on every supported
# architecture. Each leg runs on real hardware for its arch, so `make test`
# actually exercises that platform's binary — no cross-compiled, untested
# artifacts. Public repo => all these hosted runners are free.
#
# On every push to main all legs build and test; only when the in-source
# version (ZD_VERSION) is bumped does the release job tag it and publish every
# platform's binaries to a separate GitOps repo.
on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to push the version tag back to this repo

concurrency:
  group: release
  cancel-in-progress: false

env:
  RELEASE_REPO: ${{ vars.RELEASE_REPO }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH || 'release' }}

jobs:
  build:
    strategy:
      fail-fast: false   # one arch failing shouldn't hide the others
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-13            # Intel
            platform: macos-x64
          - os: macos-14            # Apple Silicon
            platform: macos-arm64
          - os: windows-latest      # x64
            platform: windows-x64
            msystem: UCRT64
            install: make gcc
            cc: gcc
          - os: windows-11-arm      # ARM64
            platform: windows-arm64
            msystem: CLANGARM64
            install: make clang
            cc: clang
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Windows builds run under MSYS2 so the POSIX makefiles work; the code's
        # own _WIN32 guards select the Windows threading/path paths at compile.
        shell: ${{ contains(matrix.os, 'windows') && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSYS2 (Windows)
        if: ${{ contains(matrix.os, 'windows') }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.install }}

      - name: Build
        run: make all ${{ matrix.cc && format('CC={0}', matrix.cc) || '' }}

      - name: Test
        run: make test ${{ matrix.cc && format('CC={0}', matrix.cc) || '' }}

      - name: Collect artifacts
        env:
          PLATFORM: ${{ matrix.platform }}
        run: sh scripts/collect-artifacts.sh

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.platform }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Runs once after every arch builds+tests. Tags the version (idempotent) and,
  # on a new version, publishes the combined per-platform artifacts.
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for idempotent tagging

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist   # each artifact -> dist/<platform>/

      - name: Tag version
        id: tag
        run: sh scripts/tag-version.sh

      - name: Push tag
        if: steps.tag.outputs.created == 'true'
        run: git push origin "${{ steps.tag.outputs.tag }}"

      - name: Publish to GitOps repo
        if: steps.tag.outputs.created == 'true'
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: sh scripts/publish.sh
